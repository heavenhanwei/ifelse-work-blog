<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- Primary SEO -->
  <title>ifelse.work - Tech Blog | Code · Thoughts · Sharing</title>
  <meta name="description" content="ifelse.work is a tech blog sharing programming experience, technical thoughts, and development practices. Covering frontend, backend, DevOps, and full-stack development.">
  <meta name="keywords" content="tech blog, programming, frontend development, backend development, DevOps, Vue.js, JavaScript, full-stack development, ifelse.work">
  <meta name="author" content="ifelse.work">
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
  <link rel="canonical" href="https://ifelse.work/">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ifelse.work/">
  <meta property="og:title" content="ifelse.work - Tech Blog">
  <meta property="og:description" content="Sharing programming experience, technical thoughts, and development practices.">
  <meta property="og:image" content="https://ifelse.work/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="ifelse.work Tech Blog">
  <meta property="og:site_name" content="ifelse.work">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://ifelse.work/">
  <meta name="twitter:title" content="ifelse.work - Tech Blog">
  <meta name="twitter:description" content="Sharing programming experience, technical thoughts, and development practices.">
  <meta name="twitter:image" content="https://ifelse.work/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1a1a2e">

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Structured Data: WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "ifelse.work",
    "url": "https://ifelse.work/",
    "description": "A tech blog sharing programming experience, technical thoughts, and development practices",
    "author": {
      "@type": "Organization",
      "name": "ifelse.work"
    },
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://ifelse.work/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Google Analytics 4 -->
  <!-- TODO: Replace G-XXXXXXXXXX with your actual GA4 Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX', {
      send_page_view: true,
      page_title: document.title,
      page_location: window.location.href
    });
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
