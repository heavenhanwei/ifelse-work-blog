<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a2350"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
  </defs>
  <!-- Circuit board background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Chip outline -->
  <rect x="12" y="12" width="40" height="40" rx="6" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <!-- Circuit traces -->
  <line x1="6" y1="24" x2="12" y2="24" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>
  <circle cx="6" cy="24" r="2" fill="#f4a261" opacity="0.5"/>
  <line x1="6" y1="40" x2="12" y2="40" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>
  <circle cx="6" cy="40" r="2" fill="#f4a261" opacity="0.5"/>
  <line x1="52" y1="24" x2="58" y2="24" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>
  <circle cx="58" cy="24" r="2" fill="#f4a261" opacity="0.5"/>
  <line x1="52" y1="40" x2="58" y2="40" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>
  <circle cx="58" cy="40" r="2" fill="#f4a261" opacity="0.5"/>
  <!-- 中 character stylized as circuit -->
  <text x="32" y="42" text-anchor="middle" font-family="'Noto Serif SC', 'SimSun', serif" font-size="30" font-weight="bold" fill="url(#accent)">中</text>
  <!-- Small tech dots -->
  <circle cx="16" cy="16" r="1.5" fill="#e63946" opacity="0.7"/>
  <circle cx="48" cy="16" r="1.5" fill="#f4a261" opacity="0.7"/>
  <circle cx="16" cy="48" r="1.5" fill="#f4a261" opacity="0.7"/>
  <circle cx="48" cy="48" r="1.5" fill="#e63946" opacity="0.7"/>
</svg>
